services:
  - type: web
    name: n8n
    env: docker
    region: Frankfurt
    plan: free
    branch: main
    numInstances: 1
    healthCheckPath: /healthz
    envVars:
      # ---------- Base SQLite par défaut ----------
      - key: DB_TYPE
        value: sqlite
      - key: DB_SQLITE_FILE
        value: /home/node/.n8n/database.sqlite

      # ---------- Configuration n8n générale ----------
      - key: PORT
        value: "5678"
      - key: N8N_LOG_LEVEL
        value: info
      - key: GENERIC_TIMEZONE
        value: Africa/Abidjan
      - key: TZ
        value: Africa/Abidjan
      - key: N8N_DEFAULT_LOCALE
        value: fr
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "true"

      # ---------- Purge automatique des exécutions ----------
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "14"
      - key: EXECUTIONS_DATA_PRUNE_MAX_COUNT
        value: "100"
      - key: EXECUTIONS_DATA_PRUNE_FORCE
        value: "true"

      # ---------- Webhooks ----------
      - key: N8N_HOST
        value: "<RENDER_SERVICE_DOMAIN>"  # À remplacer après le build par chaque utilisateur
      - key: N8N_PROTOCOL
        value: "https"                    # Render fournit HTTPS par défaut
      - key: N8N_PORT
        value: "5678"                     # doit correspondre au PORT défini plus haut
      - key: WEBHOOK_TUNNEL_URL
        value: ""                         # optionnel, à remplir si tunnel externe utilisé
