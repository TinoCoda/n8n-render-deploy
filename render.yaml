services:
  - type: web
    name: n8n
    env: docker
    region: Frankfurt
    plan: free
    branch: main
    numInstances: 1
    healthCheckPath: /healthz
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: "<host>.neon.tech"
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        value: "<database>"
      - key: DB_POSTGRESDB_USER
        value: "<user>"
      - key: DB_POSTGRESDB_PASSWORD
        value: "<password>"
      - key: DB_POSTGRESDB_SSL
        value: "true"
      - key: PORT
        value: "5678"
      - key: N8N_LOG_LEVEL
        value: info
      - key: GENERIC_TIMEZONE
        value: Africa/Abidjan
      - key: TZ
        value: Africa/Abidjan
      - key: N8N_DEFAULT_LOCALE
        value: fr
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "true"
      # Purge auto des exécutions
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "14"
      - key: EXECUTIONS_DATA_PRUNE_MAX_COUNT
        value: "100"
      - key: EXECUTIONS_DATA_PRUNE_FORCE
        value: "true"
