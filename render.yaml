services:
  - type: web
    name: n8n
    env: docker
    region: Frankfurt
    plan: free
    branch: main
    numInstances: 1
    healthCheckPath: /healthz
    envVars:
      # ---------- Base SQLite par défaut ----------
      - key: DB_TYPE
        value: sqlite
      - key: DB_SQLITE_FILE
        value: /home/node/.n8n/database.sqlite

      # ---------- Configuration n8n générale ----------
      - key: PORT
        value: "5678"
      - key: N8N_LOG_LEVEL
        value: info
      - key: GENERIC_TIMEZONE
        value: Africa/Abidjan
      - key: TZ
        value: Africa/Abidjan
      - key: N8N_DEFAULT_LOCALE
        value: fr
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "true"

      # ---------- Purge automatique des exécutions ----------
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"                  # Active la purge automatique
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "14"                    # Nombre de jours à garder
      - key: EXECUTIONS_DATA_PRUNE_MAX_COUNT
        value: "100"                   # Maximum d’exécutions conservées par workflow
      - key: EXECUTIONS_DATA_PRUNE_FORCE
        value: "true"                  # Force la purge même si exécutions actives
